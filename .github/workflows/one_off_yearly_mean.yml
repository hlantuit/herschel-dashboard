
name: One-Off - Compute Yearly Mean
 
# Manual trigger ONLY - this never runs on a schedule, so it won't
# interfere with the regular dashboard workflow. Run it once, read the
# printed result in the Action log, then delete this file (and
# compute_yearly_mean_once.py) since you won't need them again for
# roughly a year.
on:
  workflow_dispatch:
 
jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xarray netCDF4 numpy
 
      - name: Compute yearly mean
        run: python -u compute_yearly_mean_once.py
 
